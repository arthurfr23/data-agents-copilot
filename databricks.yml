bundle:
  name: data_agents

workspace:
  host: ${workspace.host}

targets:
  dev:
    mode: development
    default: true
  
resources:
  jobs:
    health_check_job:
      name: "[${bundle.target}] Databricks Agents Health Check"
      tasks:
        - task_key: run_health_check
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
          spark_python_task:
            python_file: ./tools/databricks_health_check.py
