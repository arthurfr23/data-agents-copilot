name: CD — Deploy to Databricks

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc'))
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Databricks CLI v2 (binário Go) — obrigatório para `bundle deploy`
      # O pacote Python `databricks-cli` é o CLI legado e NÃO suporta Asset Bundles
      - name: Install Databricks CLI v2
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: |
          databricks configure --host "$DATABRICKS_HOST" --token "$DATABRICKS_TOKEN" --profile DEFAULT

      - name: Deploy with Databricks Asset Bundles
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: |
          databricks bundle deploy --target staging

      - name: Sync Skills to Workspace (apenas .md e .py)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: |
          databricks workspace mkdirs /Shared/data-agents/skills
          find skills/ -name "*.md" -o -name "*.py" | while read f; do
            target="/Shared/data-agents/${f}"
            dir=$(dirname "$target")
            databricks workspace mkdirs "$dir" 2>/dev/null || true
            databricks workspace import "$f" "$target" --overwrite
          done

      - name: Verify skills sync
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: |
          databricks workspace ls /Shared/data-agents/skills/databricks/databricks-spark-declarative-pipelines/
          databricks workspace ls /Shared/data-agents/skills/fabric/
          echo "Skills sync verified."

  # ─── Deploy to Production ──────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc'))
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Databricks CLI v2 (binário Go) — obrigatório para `bundle deploy`
      - name: Install Databricks CLI v2
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PRODUCTION }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PRODUCTION }}
        run: |
          databricks configure --host "$DATABRICKS_HOST" --token "$DATABRICKS_TOKEN" --profile DEFAULT

      - name: Deploy with Databricks Asset Bundles
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PRODUCTION }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PRODUCTION }}
        run: |
          databricks bundle deploy --target production

      - name: Sync Skills to Workspace (apenas .md e .py)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PRODUCTION }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PRODUCTION }}
        run: |
          databricks workspace mkdirs /Shared/data-agents/skills
          find skills/ -name "*.md" -o -name "*.py" | while read f; do
            target="/Shared/data-agents/${f}"
            dir=$(dirname "$target")
            databricks workspace mkdirs "$dir" 2>/dev/null || true
            databricks workspace import "$f" "$target" --overwrite
          done

      - name: Verify deployment
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PRODUCTION }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PRODUCTION }}
        run: |
          echo "Verifying deployment..."
          databricks workspace ls /Shared/data-agents/skills/databricks/databricks-spark-declarative-pipelines/
          databricks workspace ls /Shared/data-agents/skills/fabric/
          databricks workspace ls /Shared/data-agents/skills/star_schema_design.md
          echo "Deployment verified successfully."
