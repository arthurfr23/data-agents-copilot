  # OBJETIVO
  Criar tabelas GOLD em dev_lakehouse a partir das Silver conforme modelagem Star Schema.

  # TABELAS SILVER DESCOBERTAS (6 no total)
  Workspace: dev_eng | Lakehouse: dev_lakehouse | Schema: silver

  Fonte:
  - slv_clientes (210K rows)
  - slv_contas (100K rows)
  - slv_contas_correntes (400K rows)
  - slv_transacoes (8.4M rows) ← FATO PRINCIPAL
  - slv_pix_devolucoes (200K rows)
  - slv_tickets (1M rows) ← FATO SECUNDÁRIA

  # MODELAGEM GOLD — Star Schema

  **FATOS:**
  1. fact_transacoes
     PK: transacao_sk (surrogate)
     Campos: id_transacao, cliente_sk, conta_sk, data_sk, canal_sk, tipo_transacao_sk, valor, fl_devolvida, status
     Fonte: slv_transacoes + slv_pix_devolucoes (join para devolvidas)

  2. fact_tickets
     PK: ticket_sk (surrogate)
     Campos: ticket_id, cliente_sk, data_abertura_sk, data_fechamento_sk, categoria_sk, tempo_resolucao_min, fl_resolvido, satisfacao_score
     Fonte: slv_tickets

  **DIMENSÕES:**
  1. dim_cliente ← slv_clientes (surrogate key: cliente_sk, natural key: id_cliente)
  2. dim_conta ← slv_contas + slv_contas_correntes (surrogate: conta_sk, natural: nr_conta)
  3. dim_data ← GERAR (date_sk YYYYMMDD, full_date, year, month, quarter, week, day_of_week, is_weekend)
  4. dim_canal ← DERIVAR de slv_transacoes.canal_origem (api, web, mobile)
  5. dim_tipo_transacao ← DERIVAR de slv_transacoes.tipo_transacao
  6. dim_categoria_ticket ← DERIVAR de slv_tickets.categoria

