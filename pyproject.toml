[project]
name = "data-agents"
version = "0.1.0"
description = "Sistema Multi-Agentes para Engenharia e Análise de Dados — Databricks + Microsoft Fabric"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    # Core — Claude Agent SDK
    "claude-agent-sdk>=0.1.48",

    # MCP Servers
    "databricks-mcp-server>=0.4.4",
    "microsoft-fabric-rti-mcp>=0.1.0",
    "microsoft-fabric-mcp>=0.1.0",

    # Databricks Enterprise & MLOps
    "databricks-sdk>=0.20.0",
    "mlflow>=2.11.0",

    # Microsoft Fabric & Identity
    "azure-identity>=1.15.0",
    "semantic-link>=0.1.0",

    # Configuração
    "pydantic-settings>=2.0",
    "python-dotenv>=1.0",

    # Output formatado
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "bandit>=1.7",
]

[project.scripts]
data-agents = "main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.sdist]
include = [
    "/config",
    "/agents",
    "/mcp_servers",
    "/hooks",
    "/commands",
    "/skills",
    "/tools",
    "/tests",
    "/main.py",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict_optional = true
warn_unused_ignores = true
warn_return_any = false

[[tool.mypy.overrides]]
module = [
    "mlflow.*",
    "claude_agent_sdk.*",
    "rich.*",
    "databricks.*",
    "azure.*",
    "pydantic_settings.*",
    "semantic_link.*",
]
ignore_missing_imports = true
