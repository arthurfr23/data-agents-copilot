resources:
  jobs:
    medallion_orchestrated_job:
      name: "[${bundle.target}] Medallion Orchestrated Job"
      description: "Orquestração completa: Silver em paralelo, Gold com dependências"
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            autoscale:
              min_workers: 1
              max_workers: 4
            spark_conf:
              spark.sql.adaptive.enabled: "true"
              spark.databricks.delta.optimizeWrite.enabled: "true"
      tasks:
        - task_key: slv_customers
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/slv_customers
        
        - task_key: slv_orders
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/slv_orders
        
        - task_key: slv_products
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/slv_products
        
        - task_key: slv_order_items
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/slv_order_items
        
        - task_key: slv_customers_enhanced
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/slv_customers_enhanced
        
        - task_key: gld_customer_360
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/gold/gld_customer_360
          depends_on:
            - task_key: slv_customers
            - task_key: slv_customers_enhanced
        
        - task_key: gld_order_analytics
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/gold/gld_order_analytics
          depends_on:
            - task_key: slv_orders
            - task_key: slv_order_items
            - task_key: slv_products
        
        - task_key: gld_revenue_summary
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/gold/gld_revenue_summary
          depends_on:
            - task_key: gld_order_analytics
            - task_key: gld_customer_360
