# Orchestrated Medallion Job
# Executa todos os notebooks da camada Silver em paralelo,
# seguido de todos os notebooks da camada Gold após conclusão bem-sucedida.

resources:
  jobs:
    orchestrated_medallion_etl:
      name: "[${bundle.target}] Orchestrated Medallion ETL"
      
      description: |
        Job que orquestra o pipeline completo Medallion:
        - Fase 1 (Silver): Todos os notebooks executados em paralelo
        - Fase 2 (Gold): Executa após conclusão bem-sucedida da Silver
      
      max_concurrent_runs: 1
      
      # Configurar com base no seu ambiente
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
            spark_conf:
              spark.databricks.delta.optimizeWrite.enabled: "true"
              spark.databricks.delta.autoCompact.enabled: "true"
            aws_attributes:
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
      
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      
      # FASE 1: SILVER (Paralelo)
      # Descomentar/adicionar conforme seus notebooks reais
      tasks:
        # Silver Tasks - Executam em paralelo
        - task_key: silver_cartoes
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/03_slv_cartoes
            base_parameters:
              catalog: ${job.parameters.catalog}
              schema: ${job.parameters.schema}
          timeout_seconds: 3600
        
        - task_key: silver_clientes
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/03_slv_clientes
            base_parameters:
              catalog: ${job.parameters.catalog}
              schema: ${job.parameters.schema}
          timeout_seconds: 3600
        
        - task_key: silver_contas
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/03_slv_contas
            base_parameters:
              catalog: ${job.parameters.catalog}
              schema: ${job.parameters.schema}
          timeout_seconds: 3600
        
        - task_key: silver_fraudes
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/03_slv_fraudes
            base_parameters:
              catalog: ${job.parameters.catalog}
              schema: ${job.parameters.schema}
          timeout_seconds: 3600
        
        - task_key: silver_transacoes
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/silver/03_slv_transacoes
            base_parameters:
              catalog: ${job.parameters.catalog}
              schema: ${job.parameters.schema}
          timeout_seconds: 3600
        
        # FASE 2: GOLD (Depende de TODAS as Silver)
        # Aguarda conclusão de todas as Silver antes de iniciar
        - task_key: gold_agregacao
          job_cluster_key: main_cluster
          depends_on:
            - task_key: silver_cartoes
            - task_key: silver_clientes
            - task_key: silver_contas
            - task_key: silver_fraudes
            - task_key: silver_transacoes
          notebook_task:
            notebook_path: /Workspace/Users/arthurferreirareis.arthur@studentambassadors.com/gold/04_agregacao_gold
            base_parameters:
              catalog: ${job.parameters.catalog}
              schema: ${job.parameters.schema}
          timeout_seconds: 3600
      
      # Trigger: Executar diariamente às 00:00
      trigger:
        periodic:
          interval: 1
          unit: DAYS
      
      # Notificações (opcional - descomentar se tiver email)
      # email_notifications:
      #   on_failure:
      #     - seu_email@example.com
      #   on_success:
      #     - seu_email@example.com
      
      # Environments
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
