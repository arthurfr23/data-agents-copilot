# ══════════════════════════════════════════════════════════════════════
# monitor_manifest.yaml — Regras de Monitoramento de Negócio
#
# Cada monitor define uma verificação autônoma que o business-monitor
# executa em ciclos programados. O SQL em `check_sql` deve retornar
# LINHAS apenas quando há problema (0 linhas = OK, ≥1 linha = alerta).
#
# Plataformas suportadas: databricks | fabric_sql
# Severidades: CRITICA | ALTA | MEDIA | BAIXA
# ══════════════════════════════════════════════════════════════════════

global:
  interval_minutes: 3           # intervalo padrão entre ciclos
  start_hour: 8                 # início do monitoramento (hora local)
  end_hour: 23                  # fim do monitoramento (hora local)
  sample_limit: 10              # máximo de registros na amostra do alerta
  alert_cooldown_minutes: 60    # tempo mínimo entre alertas do mesmo monitor

monitors:

  # ── ESTOQUE ───────────────────────────────────────────────────────
  - name: "Estoque Crítico"
    platform: databricks
    # Substitua pelo catálogo/schema/tabela real do seu ambiente
    table: "demo_dab.bronze.controle_estoque"
    check_sql: |
     SELECT
        sku,
        nome_produto,
        estoque_atual,
        estoque_minimo
      FROM demo_dab.bronze.controle_estoque
      WHERE estoque_atual < (estoque_minimo )
      LIMIT 100
    severity: CRITICA
    message_template: "{count} produto(s) com estoque abaixo do mínimo esperado!"
    active: true

  - name: "Estoque Zerado"
    platform: databricks
    table: "demo_dab.bronze.controle_estoque"
    check_sql: |
      SELECT
        sku,
        nome_produto,
        estoque_atual
      FROM demo_dab.bronze.controle_estoque
      WHERE estoque_atual = 0
      LIMIT 100
    severity: CRITICA
    message_template: "{count} produto(s) com estoque ZERADO."
    active: true
    interval_minutes: 3        # verifica mais frequentemente

