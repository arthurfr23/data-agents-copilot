# ════════════════════════════════════════════════════════════════════════════
# Slash Commands — Data Agents
# ════════════════════════════════════════════════════════════════════════════
# Fonte única de verdade para o parser em commands/parser.py.
# Adicionar ou editar comandos aqui; o loader carrega automaticamente.
# ════════════════════════════════════════════════════════════════════════════

commands:
  brief:
    agent: business-analyst
    doma_mode: full
    description: |-
      Processa transcript de reunião ou briefing e gera backlog estruturado (P0/P1/P2). Use antes do /plan quando o input for um documento bruto de negócio.
    skills:
    - templates/backlog.md
    prompt_template: |-
      [DOMA INTAKE] Delegue IMEDIATAMENTE para business-analyst. NÃO crie PRD, NÃO peça aprovação neste momento. O agente deve: (1) Ler o template em `templates/backlog.md` para entender o formato de saída. (2) Processar o documento abaixo extraindo stakeholders, decisões, requisitos e restrições. (3) Mapear cada requisito ao domínio técnico correto (Databricks/Fabric/pipelines/SQL/etc). (4) Priorizar os itens em P0 (crítico, máx 3), P1 (importante) e P2 (desejável). (5) Garantir que o diretório `output/backlog/` existe (Bash: mkdir -p output/backlog). (6) Salvar o backlog preenchido em `output/backlog/backlog_<nome_descritivo>.md` via Write. (7) Apresentar resumo com contagem por prioridade e o próximo passo:     /plan output/backlog/backlog_<nome_descritivo>.md IMPORTANTE: Se o input for um caminho de arquivo (ex: inputs/reuniao.txt), leia o arquivo com Read() antes de processar. Documento: {task}
    display_template: '[bold blue]📋 [DOMA Intake] Processando documento com: {agent}[/bold blue]'
  sql:
    agent: sql-expert
    doma_mode: express
    description: Envia tarefa SQL diretamente para o SQL Expert (DOMA Express).
    skills:
    - skills/sql_generation.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para sql-expert. Não crie PRD, não peça aprovação. Instrua o agente a ler as skills relevantes do seu Mapa de Skills antes de gerar código. Tarefa: {task}
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  spark:
    agent: spark-expert
    doma_mode: express
    description: Envia tarefa PySpark diretamente para o Spark Expert (DOMA Express).
    skills:
    - skills/databricks/databricks-spark-declarative-pipelines/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para spark-expert. Não crie PRD, não peça aprovação. Instrua o agente a ler as skills relevantes do seu Mapa de Skills antes de gerar código. Tarefa: {task}
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  pipeline:
    agent: pipeline-architect
    doma_mode: express
    description: Envia tarefa de pipeline para o Pipeline Architect (DOMA Express).
    skills:
    - skills/pipeline_design.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para pipeline-architect. Não crie PRD, não peça aprovação. Instrua o agente a ler as skills relevantes do seu Mapa de Skills antes de gerar código. Tarefa: {task}
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  fabric:
    agent: pipeline-architect
    doma_mode: express
    description: |-
      Envia tarefa Fabric para o agente correto (DOMA Express). Roteia automaticamente para semantic-modeler quando a tarefa envolve Semantic Model, Direct Lake, DAX ou Power BI.
    skills:
    - skills/fabric/fabric-medallion/SKILL.md
    - skills/fabric/fabric-direct-lake/SKILL.md
    - skills/fabric/fabric-data-factory/SKILL.md
    prompt_template: "[DOMA EXPRESS — FABRIC] Avalie a tarefa abaixo e delegue IMEDIATAMENTE ao agente correto. NÃO crie PRD,\
      \ NÃO peça aprovação. \n\n⛔ RESTRIÇÃO ABSOLUTA DE PLATAFORMA:\nEste comando é exclusivo para Microsoft Fabric. NUNCA\
      \ use ferramentas Databricks (mcp__databricks__*) neste contexto. Se as ferramentas Fabric não retornarem dados, reporte\
      \ o erro claramente — NUNCA substitua por dados do Databricks. Dados de plataforma errada são inaceitáveis.\n\nPARA\
      \ DESCOBERTA DE TABELAS NO LAKEHOUSE (schemas bronze/silver/gold):\n→ Use PRIMEIRO mcp__fabric_sql__fabric_sql_list_tables()\
      \ — acessa todos os schemas via SQL Analytics Endpoint.\n→ Se fabric_sql não estiver disponível, use mcp__fabric_community__list_tables()\
      \ — mas este só retorna schema dbo.\n→ Se ambos falharem, informe o erro e oriente o usuário a configurar fabric_sql\
      \ no .env.\n\nREGRAS DE ROTEAMENTO (aplique antes de delegar):\n→ Se a tarefa mencionar: Semantic Model, Direct Lake,\
      \ Power BI, DAX — DELEGAR para semantic-modeler.\n→ Para TODOS os outros casos Fabric (Lakehouse, Data Factory, RTI,\
      \ Eventhouse, Bronze/Silver/Gold, tabelas, schemas, pipelines) — DELEGAR para pipeline-architect ou sql-expert conforme\
      \ a natureza da tarefa.\n\nTarefa: {task}"
    display_template: '[bold yellow]🚀 [DOMA Express] Direcionando para: {agent} (Fabric)[/bold yellow]'
  plan:
    agent: null
    doma_mode: full
    description: Inicia o fluxo DOMA completo com PRD e aprovação.
    skills: []
    prompt_template: |-
      Como Product Manager/Arquiteto (DOMA Passo 1), você deve criar um PRD completo para a tarefa abaixo. ANTES de escrever qualquer linha do PRD, use a ferramenta Read para ler os skills relevantes: (1) Identifique o tipo de tarefa (SDP, Structured Streaming, Jobs, Fabric Lakehouse, RTI, etc). (2) Consulte o Mapa de Skills no seu system prompt para decidir quais SKILL.md ler. (3) Leia TODOS os skills identificados antes de começar o PRD. (4) Garanta que o diretório `output/prd/` existe (Bash: mkdir -p output/prd). (5) Crie um PRD detalhado em `output/prd/prd_<nome_descritivo>.md` usando Bash, incluindo: arquitetura Medallion moderna (Bronze→Silver→Gold), padrões obrigatórios por camada, agentes a acionar e ordem de execução. Se a tarefa envolver Star Schema ou Gold Layer com dim_*/fact_*, inclua no PRD as regras de `skills/star_schema_design.md`: autonomia das dimensões, geração sintética de dim_data via SEQUENCE, e INNER JOIN obrigatório nas fact_*. (6) Apresente o resumo do PRD e aguarde aprovação antes de delegar. Após aprovação: garanta que `output/specs/` existe (mkdir -p output/specs) e salve a SPEC em `output/specs/spec_<nome_descritivo>.md`. Tarefa: {task}
    display_template: |-
      [bold purple]🗺️ [DOMA Agile] Iniciando Context Engineering — lendo skills relevantes...[/bold purple]
  health:
    agent: null
    doma_mode: internal
    description: Verifica a conectividade com as plataformas configuradas.
    skills: []
    prompt_template: |-
      Execute um diagnóstico de conectividade: (1) Verifique quais plataformas MCP estão configuradas e acessíveis. (2) Para Databricks: tente listar catálogos via mcp__databricks__list_catalogs. (3) Para Fabric: tente listar workspaces via mcp__fabric__list_workspaces. (4) Para Fabric RTI: tente listar databases via mcp__fabric_rti__kusto_list_databases. (5) Apresente um relatório de status de cada plataforma.
    display_template: '[bold cyan]🏥 [Health Check] Verificando conectividade das plataformas...[/bold cyan]'
  status:
    agent: null
    doma_mode: internal
    description: Lista PRDs gerados e status da sessão atual.
    skills: []
    prompt_template: |-
      Liste os artefatos gerados nas seguintes pastas usando Glob e Read: (1) PRDs em `output/prd/` — mostre nome, data e primeiras 5 linhas de cada um. (2) SPECs em `output/specs/` — mostre nome e primeiras 3 linhas. (3) Backlogs em `output/backlog/` — mostre nome e prioridades (P0/P1/P2). Se alguma pasta não existir ou estiver vazia, informe que nenhum artefato foi gerado ainda.
    display_template: '[bold cyan]📋 [Status] Consultando PRDs e estado da sessão...[/bold cyan]'
  review:
    agent: null
    doma_mode: internal
    description: Revisita um PRD existente sem recriar do zero.
    skills: []
    prompt_template: |-
      Leia o PRD mais recente da pasta `output/prd/` (ou o PRD especificado: {task}). Se existir uma SPEC correspondente em `output/specs/`, leia-a também. Apresente um resumo do PRD e pergunte ao usuário se deseja: (1) Continuar a implementação a partir deste PRD, (2) Modificar algum aspecto da arquitetura, ou (3) Descartar e criar um novo PRD.
    display_template: '[bold purple]🔄 [Review] Revisitando PRD existente...[/bold purple]'
  dbt:
    agent: dbt-expert
    doma_mode: express
    description: |-
      Envia tarefa dbt diretamente para o dbt Expert (DOMA Express). Use para models, testes, snapshots, seeds, documentação e boas práticas de projeto dbt.
    skills:
    - kb/sql-patterns/index.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para dbt-expert. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/sql-patterns/index.md` antes de executar e a buscar documentação atualizada via context7 se necessário. Tarefa: {task}
    display_template: '[bold yellow]🛠️ [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  quality:
    agent: data-quality-steward
    doma_mode: express
    description: Envia tarefa de qualidade de dados para o Data Quality Steward (DOMA Express).
    skills:
    - kb/data-quality/index.md
    - skills/data_quality.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para data-quality-steward. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/data-quality/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]🔍 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  governance:
    agent: governance-auditor
    doma_mode: express
    description: Envia tarefa de governança para o Governance Auditor (DOMA Express).
    skills:
    - kb/governance/index.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para governance-auditor. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/governance/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]🔐 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  semantic:
    agent: semantic-modeler
    doma_mode: express
    description: Envia tarefa de modelagem semântica para o Semantic Modeler (DOMA Express).
    skills:
    - kb/semantic-modeling/index.md
    - skills/fabric/fabric-direct-lake/SKILL.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para semantic-modeler. Não crie PRD, não peça aprovação. Instrua o agente a ler `kb/semantic-modeling/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]📊 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  python:
    agent: python-expert
    doma_mode: express
    description: |-
      Envia tarefa Python diretamente para o Python Expert (DOMA Express). Use para: pacotes, automação, APIs REST, CLIs, testes pytest, pandas/polars, FastAPI.
    skills:
    - kb/python/index.md
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para python-expert. Não crie PRD, não peça aprovação. Instrua o agente a buscar documentação atualizada via context7 se necessário e a seguir PEP 8, type hints e mínimo de dependências externas. Tarefa: {task}
    display_template: '[bold yellow]🐍 [DOMA Express] Direcionando para: {agent}[/bold yellow]'
  migrate:
    agent: migration-expert
    doma_mode: full
    description: |-
      Inicia assessment e migração de SQL Server ou PostgreSQL para Databricks/Fabric. Gera PRD de migração com mapeamento de tipos, Medallion e estratégia de cutover. Exemplos: /migrate sql-server para databricks | /migrate postgres para fabric
    skills:
    - kb/migration/index.md
    prompt_template: |-
      [DOMA MIGRATE] Delegue IMEDIATAMENTE para migration-expert. Não gere SQL diretamente. O agente deve: (1) Ler `kb/migration/index.md` para regras de mapeamento de tipos e anti-padrões. (2) Conectar ao banco de origem via migration_source MCP para extrair DDL e estatísticas. (3) Gerar assessment de complexidade (LOW/MEDIUM/HIGH) por objeto. (4) Propor arquitetura Medallion Bronze→Silver→Gold no destino. (5) Salvar o plano de migração em `output/migration/migration_plan_<nome>.md`. (6) Apresentar resumo e aguardar aprovação antes de gerar scripts. Tarefa: {task}
    display_template: '[bold yellow]🚚 [DOMA Migrate] Iniciando assessment com: {agent}[/bold yellow]'
  genie:
    agent: semantic-modeler
    doma_mode: express
    description: Cria ou atualiza Genie Spaces no Databricks para Conversational BI (DOMA Express).
    skills:
    - kb/semantic-modeling/index.md
    prompt_template: |-
      [DOMA EXPRESS — GENIE] Delegue IMEDIATAMENTE para semantic-modeler. Não crie PRD, não peça aprovação. O agente deve usar as ferramentas Databricks Genie (mcp__databricks_genie__*) para criar ou atualizar o Genie Space conforme solicitado. Instrua o agente a ler `kb/semantic-modeling/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]🧞 [DOMA Express] Criando Genie Space com: {agent}[/bold yellow]'
  dashboard:
    agent: semantic-modeler
    doma_mode: express
    description: Cria ou publica AI/BI Dashboards no Databricks (DOMA Express).
    skills:
    - kb/semantic-modeling/index.md
    prompt_template: |-
      [DOMA EXPRESS — DASHBOARD] Delegue IMEDIATAMENTE para semantic-modeler. Não crie PRD, não peça aprovação. O agente deve usar as ferramentas Databricks AI/BI Dashboard para criar ou publicar o dashboard conforme solicitado. Instrua o agente a ler `kb/semantic-modeling/index.md` antes de executar. Tarefa: {task}
    display_template: '[bold yellow]📈 [DOMA Express] Criando Dashboard com: {agent}[/bold yellow]'
  party:
    agent: null
    doma_mode: internal
    description: |-
      Convoca múltiplos agentes especialistas em paralelo para perspectivas independentes. Grupos: padrão (sql+spark+pipeline) | --quality | --arch | --full. Ou especifique agentes: /party sql-expert spark-expert <query>.
    skills: []
    prompt_template: '{task}'
    display_template: '[bold magenta]🎉 [DOMA Party Mode] Convocando agentes em paralelo...[/bold magenta]'
  memory:
    agent: null
    doma_mode: internal
    description: |-
      Gerencia o sistema de memória persistente. Subcomandos: status, flush, compile, lint, search <query>.
    skills: []
    prompt_template: '[MEMORY COMMAND] {task}'
    display_template: '[bold cyan]🧠 [Memory] Gerenciando memória persistente...[/bold cyan]'
  sessions:
    agent: null
    doma_mode: internal
    description: |-
      Lista sessões registradas (transcript + checkpoint). Sem argumentos exibe as 20 mais recentes. Subcomandos: /sessions all (todas) | /sessions <session_id> (detalhes).
    skills: []
    prompt_template: '[SESSIONS COMMAND] {task}'
    display_template: '[bold cyan]📚 [Sessions] Listando sessões registradas...[/bold cyan]'
  resume:
    agent: null
    doma_mode: internal
    description: |-
      Retoma uma sessão anterior reconstruindo o contexto a partir do transcript. Uso: /resume last (mais recente) ou /resume <session_id>. Respeita o budget de contexto (~15k tokens por padrão).
    skills: []
    prompt_template: '[RESUME COMMAND] {task}'
    display_template: '[bold cyan]🔄 [Resume] Retomando sessão anterior...[/bold cyan]'
  geral:
    agent: geral
    doma_mode: express
    description: |-
      Pergunta conversacional respondida pelo Claude Haiku. Ideal para dúvidas técnicas, conceitos, explicações e perguntas gerais de dados. Rápido e econômico.
    skills: []
    prompt_template: |-
      [DOMA EXPRESS] Delegue IMEDIATAMENTE para geral. NÃO leia arquivos, NÃO use ferramentas, NÃO consulte KBs. O agente responde do próprio conhecimento. Não crie PRD, não peça aprovação. Pergunta: {task}
    display_template: '[bold cyan]💬 [Geral] Respondendo com Claude Haiku...[/bold cyan]'
  monitor:
    agent: business-monitor
    doma_mode: internal
    description: |-
      Controla o Business Monitor autônomo. Subcomandos: on | off | status | run | ask <pergunta>. Exemplos: /monitor status | /monitor off | /monitor ask por que o estoque do SKU-001 foi alertado?
    skills: []
    prompt_template: '{task}'
    display_template: '[bold green]📡 [Monitor] Business Monitor — {agent}[/bold green]'
  workflow:
    agent: null
    doma_mode: full
    description: |-
      Executa um workflow colaborativo pré-definido (WF-01 a WF-05) com encadeamento de contexto entre agentes e suporte a etapas paralelas. Exemplos: /workflow WF-01 pipeline bronze-gold vendas | /workflow WF-05 migrar SQL Server
    skills:
    - kb/collaboration-workflows.md
    prompt_template: |-
      [DOMA WORKFLOW] Execute o workflow pré-definido identificado na tarefa abaixo. Consulte `kb/collaboration-workflows.md` para os detalhes do workflow solicitado. Siga a sequência de agentes definida, passando o contexto de cada etapa para a próxima. Compile o contexto do workflow em `output/workflow-context/<wf-id>-context.md` antes de invocar o primeiro agente. Se o workflow exigir aprovação humana em alguma etapa, pause e aguarde confirmação. Tarefa: {task}
    display_template: '[bold magenta]⚙️ [DOMA Workflow] Iniciando workflow colaborativo...[/bold magenta]'
