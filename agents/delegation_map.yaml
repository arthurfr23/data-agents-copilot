# ════════════════════════════════════════════════════════════════════════════
# Delegation Map — fonte única do roteamento "Situação → Agente"
# ════════════════════════════════════════════════════════════════════════════
# Regra: adicionar agente = editar este YAML; a tabela markdown em
# kb/task_routing.md §2 é regenerada a partir daqui (agents/delegation.py).
#
# Campos:
#   situation  — rótulo humano exibido na tabela markdown
#   agent      — slug do agente (tem que existir em agents/registry/<slug>.md)
#   tier       — T0/T1/T2/T3 (informativo; fonte de verdade é o frontmatter do registry)
#   keywords   — (opcional) palavras-chave para classificação programática futura
# ════════════════════════════════════════════════════════════════════════════

routes:
  # Migração
  - situation: "Migração SQL Server/PostgreSQL → Databricks/Fabric"
    agent: migration-expert
    tier: T1
    keywords: [migração, migration, "sql-server", "sql server", postgres, postgresql]
  - situation: "/migrate ou assessment de banco relacional"
    agent: migration-expert
    tier: T1
    keywords: [migrate, assessment, cutover]
  - situation: "DDL de origem extraído → propor Medallion"
    agent: migration-expert
    tier: T1
    keywords: [ddl, medallion, assessment]

  # Intake de requisitos
  - situation: "Transcript / briefing / notas brutas"
    agent: business-analyst
    tier: T0
    keywords: [transcript, briefing, reunião, ata, notas]
  - situation: "Input não estruturado antes do /plan"
    agent: business-analyst
    tier: T0
    keywords: [brief, intake, requisitos]

  # Qualidade
  - situation: "Tabela nova ingerida → validar qualidade"
    agent: data-quality-steward
    tier: T2
    keywords: [qualidade, validação, expectations, profiling]
  - situation: "Alerta de qualidade disparado → investigar"
    agent: data-quality-steward
    tier: T2
    keywords: [alerta, SLA, violação]
  - situation: "Schema drift em streaming"
    agent: data-quality-steward
    tier: T2
    keywords: ["schema drift", "data drift", streaming]

  # Governança
  - situation: "Pipeline modificado → verificar conformidade"
    agent: governance-auditor
    tier: T2
    keywords: [conformidade, auditoria, compliance]
  - situation: "Acesso incomum detectado → auditar"
    agent: governance-auditor
    tier: T2
    keywords: [acesso, audit, permissões]
  - situation: "Dados PII expostos → classificar e proteger"
    agent: governance-auditor
    tier: T2
    keywords: [PII, LGPD, GDPR, sensível]

  # Modelagem semântica e BI
  - situation: "Gold Layer criada → preparar para consumo BI"
    agent: semantic-modeler
    tier: T2
    keywords: [gold, BI, consumo]
  - situation: "Semantic Model mencionado (Fabric/Power BI/DAX)"
    agent: semantic-modeler
    tier: T2
    keywords: ["semantic model", "power bi", DAX, "direct lake"]
  - situation: "Criar/atualizar Genie Space (Databricks)"
    agent: semantic-modeler
    tier: T2
    keywords: [genie, "conversational bi"]
  - situation: "Criar/publicar AI/BI Dashboard (Databricks)"
    agent: semantic-modeler
    tier: T2
    keywords: [dashboard, "ai/bi", aibi]
  - situation: "Consultar endpoint de modelo ML/GenAI"
    agent: semantic-modeler
    tier: T2
    keywords: ["model serving", mlflow, endpoint]
  - situation: "Relatório de métricas / análise consumível"
    agent: semantic-modeler
    tier: T2
    keywords: [métricas, KPI, relatório]

  # Pipelines e infraestrutura
  - situation: "Criar Knowledge Assistant (KA) / Mosaic (MAS)"
    agent: pipeline-architect
    tier: T1
    keywords: [KA, MAS, "knowledge assistant", mosaic]
  - situation: "Executar código serverless / criar cluster/warehouse"
    agent: pipeline-architect
    tier: T1
    keywords: [serverless, cluster, warehouse, execute_code]

  # SQL e Spark
  - situation: "Múltiplas queries SQL independentes em paralelo"
    agent: sql-expert
    tier: T1
    keywords: [execute_sql_multi, "queries paralelas"]
  - situation: "PySpark / Spark SQL / DLT"
    agent: spark-expert
    tier: T1
    keywords: [pyspark, "spark sql", dlt, lakeflow, delta]

  # dbt
  - situation: "dbt (models, refs, sources, testes, snapshots)"
    agent: dbt-expert
    tier: T2
    keywords: [dbt, models, refs, snapshot, "dbt test", "dbt run"]

  # Python puro
  - situation: "Python puro (pacotes, APIs, CLIs, pandas/polars)"
    agent: python-expert
    tier: T1
    keywords: [python, pandas, polars, fastapi, typer, pytest, pydantic]

  # Operações
  - situation: "Alerta de negócio recebido (estoque, vendas, SLA)"
    agent: business-monitor
    tier: T2
    keywords: [alerta, estoque, vendas, "sla violado"]
  - situation: "Pergunta conceitual sem MCP"
    agent: geral
    tier: T3
    keywords: [conceito, explique, "o que é"]
