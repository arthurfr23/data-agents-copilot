# ═══════════════════════════════════════════════════════════════════
# Data Agents — Pre-commit Hooks
# Gate de qualidade local: roda antes de todo `git commit`
#
# Instalação:
#   pip install pre-commit
#   pre-commit install
#
# Execução manual em todos os arquivos:
#   pre-commit run --all-files
# ═══════════════════════════════════════════════════════════════════

repos:
  # ─── Ruff: linting + formatação (substitui flake8, black, isort) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix", "--output-format=full"]
      - id: ruff-format

  # ─── Checagens básicas de arquivos ───────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  # ─── Segurança: bandit ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: bandit
        name: bandit security scan
        entry: bandit
        language: system
        args: ["-r", "agents/", "config/", "hooks/", "commands/", "-ll", "--skip", "B101"]
        types: [python]
        pass_filenames: false
